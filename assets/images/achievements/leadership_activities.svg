<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" width="100%" height="100%" style="background-color: #DEDBE6;">
  <defs>
    <pattern id="grid5" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="#543A20" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#DEDBE6"/>
  <rect width="100%" height="100%" fill="url(#grid5)"/>

  <!-- Collaborative Circle / Gears / Nodes -->
  <g transform="translate(150, 160)">
    <!-- Central Leader Node -->
    <circle cx="0" cy="-20" r="24" fill="#543A20"/>
    <!-- Leader Icon -->
    <path d="M -8,-25 L 8,-25 L 12,-15 L 0,-5 L -12,-15 Z" fill="#FFFFFF"/>

    <!-- Connected Team Nodes -->
    <line x1="-80" y1="40" x2="-20" y2="-10" stroke="#543A20" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="80" y1="40" x2="20" y2="-10" stroke="#543A20" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="0" y1="60" x2="0" y2="10" stroke="#543A20" stroke-width="2" stroke-dasharray="4,4"/>

    <circle cx="-80" cy="40" r="16" fill="#F7F7F2" stroke="#543A20" stroke-width="1.5"/>
    <circle cx="80" cy="40" r="16" fill="#F7F7F2" stroke="#543A20" stroke-width="1.5"/>
    <circle cx="0" cy="60" r="16" fill="#F7F7F2" stroke="#543A20" stroke-width="1.5"/>

    <!-- Small Speech bubbles representing discussions -->
    <path d="M -50,10 H -30 V 25 L -40,20 Z" fill="#EAE3D9" stroke="#543A20" stroke-width="1"/>
    <path d="M 30,10 H 50 V 25 L 40,20 Z" fill="#EAE3D9" stroke="#543A20" stroke-width="1"/>
  </g>

  <!-- Labels -->
  <text x="150" y="295" font-family="Gantari, sans-serif" font-weight="bold" font-size="16" fill="#543A20" text-anchor="middle">SRMC TECHNICAL CLUB</text>
  <text x="150" y="315" font-family="Poppins, sans-serif" font-size="11" fill="#543A20" opacity="0.8" text-anchor="middle">Executive Member & Organizer</text>
  <text x="150" y="330" font-family="Poppins, sans-serif" font-size="9" fill="#543A20" opacity="0.6" text-anchor="middle">Coding Workshops & Design Club</text>
</svg>
