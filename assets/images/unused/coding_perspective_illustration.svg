<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" style="background-color: #1f1f1f;">
  <!-- Dark Grid background pattern -->
  <defs>
    <pattern id="darkgrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#1f1f1f"/>
  <rect width="100%" height="100%" fill="url(#darkgrid)"/>

  <!-- Glows -->
  <circle cx="250" cy="250" r="180" fill="#543A20" opacity="0.15" filter="blur(20px)" />
  <circle cx="250" cy="250" r="120" fill="#DEDBE6" opacity="0.08" filter="blur(10px)" />

  <!-- Isometric/Perspective Modular Architecture Stack -->
  <g transform="translate(250, 120)">
    <!-- Layer 3 (Top: User Experience / Frontend) -->
    <g transform="translate(0, 0)">
      <!-- Top Face -->
      <path d="M 0,-20 L 100,30 L 0,80 L -100,30 Z" fill="#DEDBE6" stroke="#543A20" stroke-width="1.5"/>
      <!-- Left Face -->
      <path d="M -100,30 L 0,80 L 0,95 L -100,45 Z" fill="#b0abb8" stroke="#543A20" stroke-width="1.5"/>
      <!-- Right Face -->
      <path d="M 0,80 L 100,30 L 100,45 L 0,95 Z" fill="#c3beca" stroke="#543A20" stroke-width="1.5"/>
      <!-- Details on top face (Browser / UI abstract) -->
      <circle cx="-30" cy="25" r="5" fill="#543A20" opacity="0.6"/>
      <circle cx="-10" cy="35" r="5" fill="#543A20" opacity="0.6"/>
      <circle cx="10" cy="45" r="5" fill="#543A20" opacity="0.6"/>
      <path d="M -70,15 L -10,45 M -50,5 L 10,35" stroke="#543A20" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <text x="-5" y="-3" font-family="Poppins, sans-serif" font-weight="bold" font-size="10" fill="#543A20" text-anchor="middle" transform="skewX(-25) rotate(15)">INTERFACE</text>
    </g>

    <!-- Connective nodes between Layer 3 and Layer 2 -->
    <line x1="-50" y1="95" x2="-50" y2="135" stroke="#DEDBE6" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="50" y1="95" x2="50" y2="135" stroke="#DEDBE6" stroke-width="2" stroke-dasharray="2,2"/>

    <!-- Layer 2 (Middle: Logic / Algorithms / Core) -->
    <g transform="translate(0, 110)">
      <!-- Top Face -->
      <path d="M 0,-20 L 100,30 L 0,80 L -100,30 Z" fill="#EAE3D9" stroke="#543A20" stroke-width="1.5"/>
      <!-- Left Face -->
      <path d="M -100,30 L 0,80 L 0,95 L -100,45 Z" fill="#b6ada0" stroke="#543A20" stroke-width="1.5"/>
      <!-- Right Face -->
      <path d="M 0,80 L 100,30 L 100,45 L 0,95 Z" fill="#cfc6b8" stroke="#543A20" stroke-width="1.5"/>
      <!-- Details on top face (Algorithm nodes / connection flow) -->
      <path d="M -50,25 L 0,50 L 50,25" fill="none" stroke="#543A20" stroke-width="2"/>
      <circle cx="-50" cy="25" r="6" fill="#543A20"/>
      <circle cx="0" cy="50" r="6" fill="#543A20"/>
      <circle cx="50" cy="25" r="6" fill="#543A20"/>
      <text x="-5" y="-3" font-family="Poppins, sans-serif" font-weight="bold" font-size="10" fill="#543A20" text-anchor="middle" transform="skewX(-25) rotate(15)">LOGIC LAYER</text>
    </g>

    <!-- Connective nodes between Layer 2 and Layer 1 -->
    <line x1="-50" y1="205" x2="-50" y2="245" stroke="#EAE3D9" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="50" y1="205" x2="50" y2="245" stroke="#EAE3D9" stroke-width="2" stroke-dasharray="2,2"/>

    <!-- Layer 1 (Bottom: Database / Storage) -->
    <g transform="translate(0, 220)">
      <!-- Top Face -->
      <path d="M 0,-20 L 100,30 L 0,80 L -100,30 Z" fill="#543A20" stroke="#EAE3D9" stroke-width="1.5"/>
      <!-- Left Face -->
      <path d="M -100,30 L 0,80 L 0,95 L -100,45 Z" fill="#3a2816" stroke="#EAE3D9" stroke-width="1.5"/>
      <!-- Right Face -->
      <path d="M 0,80 L 100,30 L 100,45 L 0,95 Z" fill="#47311c" stroke="#EAE3D9" stroke-width="1.5"/>
      <!-- Database cylinder design -->
      <path d="M -30,20 C -30,10 30,10 30,20 L 30,40 C 30,50 -30,50 -30,40 Z" fill="#FFFFFF" opacity="0.15" stroke="#FFFFFF" stroke-width="1"/>
      <path d="M -30,30 C -30,20 30,20 30,30" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
      <text x="-5" y="-3" font-family="Poppins, sans-serif" font-weight="bold" font-size="10" fill="#FFFFFF" text-anchor="middle" transform="skewX(-25) rotate(15)">DATA STORE</text>
    </g>
  </g>

  <!-- Title / Statement text inside illustration -->
  <text x="250" y="470" font-family="Gantari, sans-serif" font-size="12" fill="#EAE3D9" font-weight="bold" letter-spacing="3" text-anchor="middle">CLEAN ARCHITECTURE</text>
</svg>
