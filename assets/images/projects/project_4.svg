<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%" style="background-color: #EEF7EE;">
  <defs>
    <pattern id="grid4" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0 L0 0 0 18" fill="none" stroke="#1f3a2f" stroke-width="0.4" stroke-opacity="0.06"/>
    </pattern>
    <linearGradient id="leafGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#7FB77E"/>
      <stop offset="100%" stop-color="#4A9B57"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#EEF7EE"/>
  <rect width="100%" height="100%" fill="url(#grid4)"/>

  <!-- Soft spotlight -->
  <circle cx="200" cy="140" r="95" fill="#DFF2DE" opacity="0.6" />

  <!-- Phone/frame representing deployed model -->
  <rect x="140" y="80" width="120" height="140" rx="12" fill="#FFFFFF" stroke="#1f3a2f" stroke-width="2"/>
  <rect x="150" y="92" width="100" height="96" rx="6" fill="#F3F9F3"/>

  <!-- Leaf icon (center) -->
  <g transform="translate(200,138)">
    <path d="M-18,6 C-6,18 6,18 18,6 C10,10 6,8 0,4 C-6,0 -10,2 -18,6 Z" fill="url(#leafGrad)" stroke="#2b5b36" stroke-width="1"/>
    <path d="M-6,-6 C-2,-2 2, -2 6,-6" fill="none" stroke="#2b5b36" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Small sample leaves representing classes -->
  <g transform="translate(60,190)">
    <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#1f3a2f" stroke-width="1.2"/>
    <path d="M-6,2 C-2,10 6,10 12,2 C6,6 2,4 -2,0 C-6,-4 -8,-2 -6,2 Z" fill="#7FB77E" stroke="#2b5b36" stroke-width="0.8"/>
    <text x="36" y="6" font-family="Poppins, sans-serif" font-size="11" fill="#1f3a2f">Healthy</text>
  </g>

  <g transform="translate(200,230)">
    <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#1f3a2f" stroke-width="1.2"/>
    <path d="M-6,2 C-2,10 6,10 12,2 C6,6 2,4 -2,0 C-6,-4 -8,-2 -6,2 Z" fill="#F6C85F" stroke="#A86B2B" stroke-width="0.8"/>
    <text x="32" y="6" font-family="Poppins, sans-serif" font-size="11" fill="#1f3a2f">Blast</text>
  </g>

  <g transform="translate(340,170)">
    <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#1f3a2f" stroke-width="1.2"/>
    <path d="M-6,2 C-2,10 6,10 12,2 C6,6 2,4 -2,0 C-6,-4 -8,-2 -6,2 Z" fill="#D96B6B" stroke="#8A3B3B" stroke-width="0.8"/>
    <text x="-44" y="6" font-family="Poppins, sans-serif" font-size="11" fill="#1f3a2f">Blight</text>
  </g>

  <!-- Connection lines -->
  <line x1="92" y1="170" x2="150" y2="150" stroke="#2b5b36" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="200" y1="200" x2="240" y2="200" stroke="#2b5b36" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="270" y1="170" x2="260" y2="140" stroke="#2b5b36" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Title -->
  <text x="200" y="40" font-family="Poppins, sans-serif" font-size="20" text-anchor="middle" fill="#1f3a2f" font-weight="600">Paddy Disease</text>
  <text x="200" y="60" font-family="Poppins, sans-serif" font-size="18" text-anchor="middle" fill="#1f3a2f" opacity="0.9">Classifier</text>

  <!-- small caption -->
  <text x="200" y="280" font-family="Poppins, sans-serif" font-size="10" text-anchor="middle" fill="#7a7a7a">CNN + Transfer Learning · FastAPI Deployment</text>
</svg>
